name: Manual Tag and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA'
        required: true
        default: 'latest'
      flavors:
        description: 'Comma-separated list of Docker image flavors (e.g., base,vnc,deploy)'
        required: true
        default: 'base'

jobs:
  tag_and_push:
    name: Tag and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Process flavors
        id: process_flavors
        run: |
          echo "FLAVORS=$(echo ${{ github.event.inputs.flavors }} | tr ',' ' ')" >> $GITHUB_ENV

      - name: Check if images exist and tag them
        run: |
          for FLAVOR in $FLAVORS; do
            IMAGE_NAME="mep3"
            if [ "$FLAVOR" != "base" ]; then
              IMAGE_NAME="mep3-$FLAVOR"
            fi
            IMAGE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" https://ghcr.io/v2/memristor/${IMAGE_NAME}/manifests/${{ github.event.inputs.commit_sha }})
            if [ "$IMAGE_EXISTS" -ne 200 ]; then
              echo "Image with commit SHA or tag ${{ github.event.inputs.commit_sha }} for flavor $FLAVOR does not exist."
              exit 1
            fi
            docker pull ghcr.io/memristor/${IMAGE_NAME}:${{ github.event.inputs.commit_sha }}
            docker tag ghcr.io/memristor/${IMAGE_NAME}:${{ github.event.inputs.commit_sha }} ghcr.io/memristor/${IMAGE_NAME}:stable
            docker push ghcr.io/memristor/${IMAGE_NAME}:stable
          done
